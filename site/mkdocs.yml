site_name: spring-ai-test-tools
site_description: Test Spring AI ChatClient/EmbeddingModel code -- real model, explicit stub, or record/replay, chosen per test
site_url: https://rifatcakir.github.io/spring-ai-test-tools/
repo_url: https://github.com/rifatcakir/spring-ai-test-tools
repo_name: rifatcakir/spring-ai-test-tools
edit_uri: edit/main/site/docs/
copyright: An independent, community-maintained project. Not affiliated with, endorsed by, or an official project of Broadcom, VMware, Spring, or Spring AI.

docs_dir: docs
site_dir: ../.site-build

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Stubbing: stub.md
  - Record & Replay: record-replay.md
  - Tool Calling: tool-calling.md
  - Structured Output: structured-output.md
  - Streaming: streaming.md
  - Embeddings: embeddings.md
  - Prompt Normalizer & Redactor: prompt-normalizer-and-redactor.md
  - Assertions: assertions.md
  - Evaluator: evaluator.md
  - Configuration Reference: configuration.md
